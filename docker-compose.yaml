version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    container_name: ${DB_HOST:-housing_agent_db}
    hostname: ${DB_HOST:-housing_agent_db}
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"

volumes:
  db-data:
